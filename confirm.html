<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akato 赤兔祝福館｜收下這份祝福</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      height: auto;
      overflow-y: auto;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #fff7f3 0%, #f7eee8 100%);
      color: #8f8580;
    }

    body {
      padding: 32px 16px 48px;
    }

    .page {
      width: 100%;
      max-width: 560px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 24px;
      padding-bottom: 48px;
      position: relative;
    }

    .card {
      width: 100%;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 36px;
      padding: 42px 28px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(168, 136, 120, 0.16);
      margin-top: 24px;
    }

    .sender-title {
      font-size: 24px;
      font-weight: 700;
      line-height: 1.6;
      letter-spacing: 0.04em;
      margin: 0 0 18px;
      color: #8f8580;
    }

    .flower {
      font-size: 28px;
      margin-bottom: 34px;
    }

    .blessing {
      font-size: 26px;
      font-weight: 500;
      line-height: 1.9;
      letter-spacing: 0.06em;
      margin: 0;
      color: #8f8580;
    }

    .claim-btn,
    .send-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 20px 22px;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 0.06em;
      cursor: pointer;
      font-family: inherit;
    }

    .claim-btn {
      background: rgba(255, 255, 255, 0.92);
      color: #8f8580;
      box-shadow: 0 12px 28px rgba(168, 136, 120, 0.14);
      margin-top: 34px;
    }

    .sub-note {
      width: 100%;
      text-align: center;
      font-size: 16px;
      line-height: 1.8;
      color: #c8beb9;
      margin: -6px 0 0;
    }

    .brand-credit {
      width: 100%;
      display: block;
      text-align: center;
      font-size: 16px;
      line-height: 1.75;
      color: #c4bab4;
      margin: 0;
      padding: 0 16px;
    }

    .send-btn {
      background: rgba(255, 247, 243, 0.72);
      color: #8f8580;
      border: 2px solid #e4cfc2;
      margin-top: 4px;
      margin-bottom: 28px;
    }

    .petal {
      position: fixed;
      color: rgba(236, 170, 185, 0.35);
      pointer-events: none;
      animation: float 8s infinite ease-in-out;
      z-index: 0;
    }

    .page > * {
      position: relative;
      z-index: 1;
    }

    .petal.one {
      left: 8%;
      top: 28%;
      font-size: 20px;
    }

    .petal.two {
      right: 12%;
      top: 42%;
      font-size: 26px;
      animation-delay: 1.5s;
    }

    .petal.three {
      left: 22%;
      bottom: 18%;
      font-size: 18px;
      animation-delay: 2.5s;
    }

    @keyframes float {
      0%, 100% {
        transform: translateY(0) rotate(0deg);
        opacity: 0.25;
      }
      50% {
        transform: translateY(-18px) rotate(12deg);
        opacity: 0.55;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 24px 14px 56px;
      }

      .page {
        gap: 20px;
        min-height: auto;
        padding-bottom: 56px;
      }

      .card {
        margin-top: 8px;
        border-radius: 30px;
        padding: 38px 24px;
      }

      .sender-title {
        font-size: 22px;
        line-height: 1.55;
      }

      .flower {
        font-size: 26px;
        margin-bottom: 30px;
      }

      .blessing {
        font-size: 24px;
        line-height: 1.8;
      }

      .claim-btn,
      .send-btn {
        font-size: 21px;
        padding: 18px 18px;
      }

      .claim-btn {
        margin-top: 28px;
      }

      .sub-note {
        font-size: 15px;
        line-height: 1.7;
      }

      .brand-credit {
        font-size: 15px;
        line-height: 1.7;
        margin-bottom: 4px;
      }

      .send-btn {
        margin-top: 10px;
        margin-bottom: 36px;
      }
    }

    @media (max-height: 700px) {
      .page {
        min-height: auto;
      }

      .card {
        padding-top: 34px;
        padding-bottom: 34px;
      }
    }
  </style>
</head>

<body>
  <div class="petal one">🌸</div>
  <div class="petal two">🌸</div>
  <div class="petal three">🌸</div>

  <main class="page">
    <section class="card">
      <h1 class="sender-title" id="senderTitle">
        有人想把這份溫柔送給你
      </h1>

      <div class="flower">🌸</div>

      <p class="blessing" id="blessingText">
        願你今天被溫柔對待，<br>
        所有美好都剛好發生。
      </p>
    </section>

    <button class="claim-btn" type="button">
      收下這份祝福 🌸
    </button>

    <p class="sub-note">
      可保存並分享給重要的人
    </p>

    <div class="brand-credit">
      Akato 赤兔祝福館<br>
    </div>

    <button class="send-btn" type="button" onclick="goSendGift()">
      我也想送給重要的人
    </button>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);

    const from = params.get("from") || "有人";
    const to = params.get("to") || "你";
    const message =
      params.get("message") ||
      "願你今天被溫柔對待，\n所有美好都剛好發生。";

    const senderTitle = document.getElementById("senderTitle");
    const blessingText = document.getElementById("blessingText");

    senderTitle.textContent = `${from}想把這份溫柔送給${to}`;

    blessingText.innerHTML = message
      .replace(/\n/g, "<br>")
      .replace(/，/g, "，<br>");

    function goSendGift() {
      window.location.href = "/";
    }
  </script>
</body>
</html>
