<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>暖心數位回禮卡｜Akato 赤兔</title>
    <style>
        /* ==================================================
           【全局設定與重置】
           ================================================== */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: "PingFang TC", "Heiti TC", "微軟正黑體", serif;
            background-color: #D4C3B3; 
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: #5E5651; 
            overflow: hidden; 
        }

        /* 手機版框架（桌機置中） */
        #app-container {
            position: relative;
            width: 100%;
            max-width: 430px;
            height: 100dvh;
            background: linear-gradient(135deg, #F7F1EC, #F3ECE6, #EFE7E1); 
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
        }

        /* ==================================================
           【共用背景層 (花瓣、粒子、柔霧) - 已修復 z-index】
           ================================================== */
        #bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1; /* 確保在最底層，不會遮擋內容 */
            pointer-events: none; /* 確保點擊穿透 */
            overflow: hidden;
        }

        .mist {
            position: absolute;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0) 70%);
            animation: mist-drift 20s infinite alternate ease-in-out;
        }

        .particle {
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: float-up linear infinite;
        }

        .petal {
            position: absolute;
            width: 12px;
            height: 12px;
            background: #F2D5D5;
            border-radius: 12px 0 12px 0;
            opacity: 0.7;
            animation: fall-and-sway linear infinite;
        }

        @keyframes mist-drift {
            0% { transform: translate(-25%, -25%); }
            100% { transform: translate(0, 0); }
        }

        @keyframes float-up {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.2); opacity: 0; }
        }

        @keyframes fall-and-sway {
            0% { transform: translateY(-50px) rotate(0deg) translateX(0); opacity: 0; }
            20% { opacity: 0.8; }
            80% { opacity: 0.8; }
            100% { transform: translateY(100vh) rotate(360deg) translateX(50px); opacity: 0; }
        }

        /* ==================================================
           【頁面架構與切換動畫】
           ================================================== */
        .page {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10; /* 確保內容在花瓣上方 */
            display: flex;
            flex-direction: column;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
            overflow-y: auto;
            padding: 40px 24px 120px 24px; 
        }

        .page.active {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }

        .page::-webkit-scrollbar { display: none; }
        .page { -ms-overflow-style: none; scrollbar-width: none; }

        /* ==================================================
           【UI 元件：商品頁專屬設計】
           ================================================== */
        .product-header {
            text-align: center;
            margin-bottom: 24px;
            width: 100%;
        }

        .brand-trust {
            font-size: 12px;
            color: #A49A92;
            letter-spacing: 2px;
            margin-bottom: 12px;
            text-transform: uppercase;
        }

        .product-title {
            font-size: 24px;
            font-weight: bold;
            color: #7A7169;
            margin-bottom: 8px;
            letter-spacing: 1px;
        }

        .product-subtitle {
            font-size: 14px;
            color: #8E847C;
            letter-spacing: 1px;
            line-height: 1.5;
        }

        .option-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        .option-card {
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(212, 195, 179, 0.5);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .option-card.active {
            background: #FFFFFF;
            border-color: #D4A373;
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.15);
            transform: translateY(-2px);
        }

        .option-title {
            font-size: 16px;
            font-weight: bold;
            color: #7A7169;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .option-card.active .option-title {
            color: #D4A373;
        }

        .option-card.active .option-title::after {
            content: "✓";
            font-size: 14px;
            color: #D4A373;
        }

        .option-desc {
            font-size: 13px;
            color: #A49A92;
            line-height: 1.4;
        }

        .preview-box {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 30px 24px;
            text-align: center;
            font-size: 17px;
            line-height: 1.8;
            letter-spacing: 1px;
            color: #5E5651;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.8);
            box-shadow: 0 8px 20px rgba(0,0,0,0.03);
            min-height: 130px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .btn-refresh { 
            background: transparent;
            border: 1px solid #D4C3B3;
            color: #8E847C;
            font-size: 13px; 
            padding: 8px 20px; 
            border-radius: 20px;
            cursor: pointer;
            display: block;
            margin: 0 auto;
            transition: all 0.3s;
        }
        .btn-refresh:hover { background: #FFFFFF; }

        .bottom-cta-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            padding: 16px 24px 24px 24px;
            border-top: 1px solid rgba(212, 195, 179, 0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 20;
            border-radius: 24px 24px 0 0;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.03);
        }

        .secure-badge {
            font-size: 12px;
            color: #A49A92;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .btn-submit {
            background-color: #D4A373; 
            color: #FFFFFF;
            border: none;
            font-weight: bold;
            font-size: 17px;
            padding: 16px 0;
            width: 100%;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(212, 163, 115, 0.3);
            letter-spacing: 1px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        
        .btn-submit:hover { background-color: #C08F62; transform: translateY(-2px); }
        .btn-submit:active { transform: translateY(1px); }

        .btn-loading {
            pointer-events: none;
            opacity: 0.8;
        }
        
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid #FFF;
            border-bottom-color: transparent;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ==================================================
           【成功頁面專屬設計】
           ================================================== */
        #page-success {
            align-items: center;
            justify-content: flex-start;
            text-align: center;
            padding: 40px 24px 60px 24px;
        }

        .success-icon {
            width: 70px;
            height: 70px;
            background: #FFFFFF;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            color: #D4A373;
            box-shadow: 0 10px 30px rgba(212, 163, 115, 0.2);
            margin-bottom: 20px;
            animation: pop-in 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
            opacity: 0;
            transform: scale(0.5);
            flex-shrink: 0;
        }

        @keyframes pop-in {
            to { opacity: 1; transform: scale(1); }
        }

        .success-title {
            font-size: 22px;
            font-weight: bold;
            color: #7A7169;
            margin-bottom: 12px;
            letter-spacing: 2px;
        }

        .success-desc {
            font-size: 15px;
            color: #8E847C;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .receipt-card {
            background: rgba(255,255,255,0.6);
            border: 1px dashed #D4C3B3;
            padding: 16px 20px;
            border-radius: 12px;
            width: 100%;
            margin-bottom: 16px;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            color: #7A7169;
            margin-bottom: 8px;
        }
        .receipt-row:last-child { margin-bottom: 0; font-weight: bold; color: #D4A373;}

        /* 今日祝福籤區塊 */
        .fortune-receipt-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.5));
            border: 1px solid rgba(212, 195, 179, 0.6);
            padding: 24px 20px;
            border-radius: 16px;
            width: 100%;
            margin-bottom: 32px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.02);
            text-align: center;
        }

        .fortune-receipt-title {
            font-size: 14px;
            color: #D4A373;
            font-weight: bold;
            letter-spacing: 2px;
            margin-bottom: 12px;
        }

        .fortune-receipt-number {
            font-size: 18px;
            color: #7A7169;
            font-weight: bold;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .fortune-receipt-poem {
            font-size: 16px;
            color: #5E5651;
            line-height: 1.8;
            letter-spacing: 2px;
            margin-bottom: 16px;
            text-align: center; 
        }

        .fortune-receipt-interpretation {
            font-size: 14px;
            color: #8E847C;
            background: rgba(247, 241, 236, 0.8);
            padding: 12px;
            border-radius: 8px;
            line-height: 1.5;
            letter-spacing: 1px;
        }

        .btn-line-share {
            background-color: #06C755;
            color: #FFF;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 1px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(6, 199, 85, 0.2);
            margin-bottom: 16px;
            transition: transform 0.3s ease;
        }
        .btn-line-share:active { transform: translateY(1px); }

    </style>
</head>
<body>

<div id="app-container">
    
    <div id="bg-layer">
        <div class="mist"></div>
        </div>

    <div id="page-product" class="page active">
        
        <div class="product-header">
            <div class="brand-trust">✦ Akato 赤兔祝福籤館 ✦</div>
            <h1 class="product-title">暖心數位回禮卡｜NT$49</h1>
            <p class="product-subtitle">只要銅板價，也能把感謝好好送回去</p>
        </div>

        <div class="option-list">
            <div class="option-card active" onclick="setGiftCategory('femaleWarmTexts', this)">
                <div class="option-title">女性暖心款</div>
                <div class="option-desc">致閨蜜與知己，如微風般的溫柔問候</div>
            </div>
            
            <div class="option-card" onclick="setGiftCategory('ancientTexts', this)">
                <div class="option-title">古風雅意款</div>
                <div class="option-desc">致長輩或氣質出眾的她，詩意典雅的祝願</div>
            </div>

            <div class="option-card" onclick="setGiftCategory('thanksTexts', this)">
                <div class="option-title">感謝回禮款</div>
                <div class="option-desc">致職場貴人，得體不失溫度的誠摯致謝</div>
            </div>

            <div class="option-card" onclick="setGiftCategory('flowerTexts', this)">
                <div class="option-title">收花回禮款</div>
                <div class="option-desc">專為收到實體花禮設計，延續花香的浪漫回覆</div>
            </div>
        </div>

        <div class="preview-box" id="gift-text-display">
            </div>
        
        <button class="btn-refresh" onclick="refreshGiftText()">↺ 換一句看看</button>

    </div>

    <div class="bottom-cta-bar" id="cta-bar">
        <div class="secure-badge">🔒 Akato 嚴選品質・加密付款・即時發送</div>
        <button class="btn-submit" id="btn-buy" onclick="processPayment()">
            <span class="spinner" id="btn-spinner"></span>
            <span id="btn-text">送出這份心意 💌</span>
        </button>
    </div>

    <div id="page-success" class="page">
        <div class="success-icon">✓</div>
        <h2 class="success-title">付款成功！</h2>
        <p class="success-desc">您的數位回禮已經準備妥當，<br>充滿溫度的祝福，隨時可以發送。</p>
        
        <div class="receipt-card">
            <div class="receipt-row"><span>商品：</span><span>暖心數位回禮卡</span></div>
            <div class="receipt-row"><span>款式：</span><span id="receipt-style">女性暖心款</span></div>
            <div class="receipt-row"><span>訂單編號：</span><span id="receipt-id">AK-</span></div>
            <div class="receipt-row" style="margin-top: 12px; padding-top: 12px; border-top: 1px solid rgba(212,195,179,0.3);">
                <span>實付金額：</span><span>NT$ 49</span>
            </div>
        </div>

        <div class="fortune-receipt-card" id="n8n-fortune-container">
            <div class="fortune-receipt-title">✨ 今日祝福籤 ✨</div>
            <div class="fortune-receipt-number" id="n8n-fortune-number">--</div>
            <div class="fortune-receipt-poem" id="n8n-fortune-poem">
                </div>
            <div class="fortune-receipt-interpretation" id="n8n-fortune-interpretation">
                </div>
        </div>

        <button class="btn-line-share" onclick="sendViaLine()">用 LINE 傳送給他</button>
        <button class="btn-refresh" style="border:none; margin-top:10px;" onclick="location.reload()">再製作一份回禮</button>
    </div>

</div>

<script>
    /* ==================================================
       【文句資料庫】
       ================================================== */
    const giftTexts = {
        femaleWarmTexts: [
            "這份小禮物，願能為妳帶來一絲溫暖與好心情。",
            "忙碌之餘，別忘了喝杯熱茶，好好照顧自己。",
            "願妳的每一天，都如今天的陽光般明媚。",
            "送上一點小心意，謝謝妳一直以來的溫柔。",
            "最美的時光，是與妳相伴的每一刻。"
        ],
        ancientTexts: [
            "願君多采擷，此物最相思。",
            "山河遠闊，人間煙火，無一是你，無一不是你。",
            "願有歲月可回首，且以深情共白頭。",
            "歲月靜好，現世安穩。",
            "與君初相識，猶如故人歸。"
        ],
        thanksTexts: [
            "由衷感謝您的支持與幫忙，這份心意代表我最深的謝意。",
            "一點心意，不足以表達我的感激之情。",
            "您的恩情，我會銘記在心。",
            "這份禮物，是我小小的心意，請笑納。",
            "感恩相遇，感謝有您。"
        ],
        flowerTexts: [
            "謝謝妳的花，願妳生活也如花般綻放。",
            "花開花落，唯有祝福常伴左右。",
            "這份花香很美，希望能為妳帶來一整天的清新。",
            "讓這份溫暖的回禮，代替我向妳問候。",
            "看見這花，就想起妳燦爛的笑容，謝謝妳的心意。"
        ]
    };

    let currentCategoryKey = 'femaleWarmTexts';
    let currentCategoryName = '女性暖心款';
    let currentGiftText = '';
    let currentFortuneId = '';

    /* ==================================================
       【背景特效初始化：修復飄落花瓣與粒子】
       ================================================== */
    function initBackground() {
        const bgLayer = document.getElementById('bg-layer');
        if(!bgLayer) return;

        // 產生花瓣
        for(let i=0; i<8; i++) {
            let petal = document.createElement('div');
            petal.className = 'petal';
            petal.style.left = Math.random() * 100 + '%';
            petal.style.animationDuration = (Math.random() * 5 + 5) + 's';
            petal.style.animationDelay = (Math.random() * 5) + 's';
            petal.style.transform = `scale(${Math.random() * 0.6 + 0.6})`;
            bgLayer.appendChild(petal);
        }
        
        // 產生微光粒子
        for(let i=0; i<10; i++) {
            let particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            let size = Math.random() * 4 + 2;
            particle.style.width = size + 'px';
            particle.style.height = size + 'px';
            particle.style.animationDuration = (Math.random() * 4 + 4) + 's';
            particle.style.animationDelay = (Math.random() * 5) + 's';
            bgLayer.appendChild(particle);
        }
    }

    /* ==================================================
       【互動邏輯】
       ================================================== */
    function setGiftCategory(categoryKey, btnElement) {
        currentCategoryKey = categoryKey;
        // 取得所選分類的名稱，用於結帳成功頁顯示
        currentCategoryName = btnElement.querySelector('.option-title').innerText;
        
        // 移除所有 active 狀態
        document.querySelectorAll('.option-card').forEach(btn => btn.classList.remove('active'));
        // 替當前點擊加上 active
        btnElement.classList.add('active');
        
        refreshGiftText();
    }

    function refreshGiftText() {
        const texts = giftTexts[currentCategoryKey];
        let newText = currentGiftText;
        
        // 確保不會連續抽到同一句
        while(newText === currentGiftText) {
            const r = Math.floor(Math.random() * texts.length);
            newText = texts[r];
        }
        currentGiftText = newText;
        
        const display = document.getElementById('gift-text-display');
        display.style.opacity = 0;
        setTimeout(() => {
            display.innerText = currentGiftText;
            display.style.opacity = 1;
            display.style.transition = 'opacity 0.3s ease';
        }, 200);
    }

    /* ==================================================
       【n8n 籤詩資料渲染邏輯】
       ================================================== */
    function renderN8nFortune(data) {
        currentFortuneId = data.fortuneId;
        document.getElementById('n8n-fortune-number').innerText = `${data.fortuneId} ${data.luck}`;
        document.getElementById('n8n-fortune-poem').innerHTML = data.poem;
        document.getElementById('n8n-fortune-interpretation').innerText = `👉 ${data.interpretation}`;
    }

    /* ==================================================
       【結帳與成功頁面切換流程】
       ================================================== */
    function processPayment() {
        const btn = document.getElementById('btn-buy');
        const spinner = document.getElementById('btn-spinner');
        const btnText = document.getElementById('btn-text');

        // 模擬結帳 Loading 狀態
        btn.classList.add('btn-loading');
        spinner.style.display = 'inline-block';
        btnText.innerText = '安全連線中...';

        setTimeout(() => {
            // 生成假訂單號
            const orderId = Math.floor(Math.random() * 900000) + 100000;
            document.getElementById('receipt-id').innerText = `AK-${orderId}`;
            document.getElementById('receipt-style').innerText = currentCategoryName;

            // --- 這裡載入預設假資料 (未來替換為 n8n API 回傳的資料) ---
            const mockN8nData = {
                fortuneId: "第18籤",
                luck: "吉",
                poem: "春風輕拂柳絲長<br>好運隨之降身旁<br>靜心等待佳音至<br>喜事連連樂無疆",
                interpretation: "柔韌如柳，你的堅持將迎來溫暖的回報。"
            };
            renderN8nFortune(mockN8nData);
            // -------------------------------------------------------------

            // 隱藏商品頁與底部列，顯示成功頁
            document.getElementById('page-product').classList.remove('active');
            document.getElementById('cta-bar').style.display = 'none';
            document.getElementById('page-success').classList.add('active');
            
            // 恢復按鈕狀態 (防重整)
            btn.classList.remove('btn-loading');
            spinner.style.display = 'none';
            btnText.innerText = '送出這份心意 💌';
        }, 1500);
    }

    function sendViaLine() {
        // 使用 LINE URL scheme，點擊後會直接開啟 LINE app 選擇好友
        const message = `✨這是我為你準備的暖心回禮！\n\n🎁 款式：${currentCategoryName}\n💌 祝福：${currentGiftText}\n\n🍀 今日幸運籤：${currentFortuneId}\n\n點擊這裡查看完整卡片：https://akato.tw/gift`;
        const encodedMessage = encodeURIComponent(message);
        const lineUrl = `line://msg/text/?${encodedMessage}`; // 確保相容的 LINE 原生分享協議
        window.open(lineUrl, '_blank');
    }

    // 初始化執行：確保載入花瓣與文案
    window.onload = () => {
        initBackground();
        refreshGiftText();
    };

</script>

</body>
