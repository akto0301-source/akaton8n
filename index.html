<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Akato 赤兔祝福館｜送出一份溫柔</title>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(180deg, #fff7f3 0%, #f7eee8 100%);
      color: #8f8580;
      overflow-y: auto;
    }

    body {
      padding: 28px 16px 48px;
    }

    .page {
      width: 100%;
      max-width: 560px;
      min-height: 100vh;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      padding-bottom: 48px;
    }

    .card {
      width: 100%;
      background: rgba(255,255,255,0.92);
      border-radius: 34px;
      padding: 36px 26px;
      text-align: center;
      box-shadow: 0 20px 45px rgba(168,136,120,0.16);
      margin-top: 20px;
    }

    h1 {
      font-size: 26px;
      line-height: 1.5;
      margin: 0 0 10px;
      color: #8f8580;
    }

    .subtitle {
      font-size: 16px;
      line-height: 1.8;
      color: #b8aaa3;
      margin: 0 0 28px;
    }

    label {
      display: block;
      text-align: left;
      font-size: 15px;
      font-weight: 700;
      margin: 18px 0 8px;
      color: #9a8d87;
    }

    input, textarea {
      width: 100%;
      border: 1.5px solid #e5d4ca;
      border-radius: 18px;
      padding: 16px;
      font-size: 18px;
      font-family: inherit;
      color: #8f8580;
      background: #fffdfb;
      outline: none;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
      line-height: 1.7;
    }

    input:focus, textarea:focus {
      border-color: #d9b9a8;
      box-shadow: 0 0 0 4px rgba(217,185,168,0.18);
    }

    .main-btn, .line-btn, .copy-btn {
      width: 100%;
      border: none;
      border-radius: 999px;
      padding: 18px 20px;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.05em;
      font-family: inherit;
      cursor: pointer;
      margin-top: 18px;
    }

    .main-btn {
      background: #8f8580;
      color: #fff;
      box-shadow: 0 12px 28px rgba(168,136,120,0.22);
    }

    .copy-btn {
      background: #fff;
      color: #8f8580;
      border: 1.5px solid #e4cfc2;
    }

    .line-btn {
      background: #06c755;
      color: white;
    }

    .result {
      width: 100%;
      display: none;
      margin-top: 24px;
      padding: 18px;
      border-radius: 22px;
      background: #fff8f5;
      border: 1px solid #ead8cf;
      text-align: left;
      word-break: break-all;
      line-height: 1.7;
      color: #9a8d87;
      font-size: 15px;
    }

    .brand-credit {
      text-align: center;
      font-size: 14px;
      line-height: 1.7;
      color: #c4bab4;
      margin-top: 4px;
    }

    @media (max-width: 480px) {
      body {
        padding: 22px 14px 56px;
      }

      .page {
        min-height: auto;
      }

      .card {
        padding: 32px 22px;
        border-radius: 30px;
      }

      h1 {
        font-size: 24px;
      }

      input, textarea {
        font-size: 17px;
      }

      .main-btn, .line-btn, .copy-btn {
        font-size: 19px;
      }
    }
  </style>
</head>

<body>
  <main class="page">
    <section class="card">
      <h1>送出一份溫柔 🌸</h1>
      <p class="subtitle">
        輸入送禮人與收禮人的名字，<br>
        產生專屬的 Akato 祝福連結。
      </p>

      <label for="fromName">送禮人</label>
      <input id="fromName" type="text" placeholder="例如：嫥慧" />

      <label for="toName">收禮人</label>
      <input id="toName" type="text" placeholder="例如：鄭羽喬" />

      <label for="message">祝福文字</label>
      <textarea id="message">願你今天被溫柔對待，所有美好都剛好發生。</textarea>

      <button class="main-btn" onclick="createGiftLink()">
        產生專屬祝福連結
      </button>

      <div class="result" id="resultBox"></div>

      <button class="copy-btn" id="copyBtn" style="display:none;" onclick="copyGiftLink()">
        複製連結
      </button>

      <button class="line-btn" id="lineBtn" style="display:none;" onclick="shareToLine()">
        分享到 LINE
      </button>
    </section>

    <div class="brand-credit">
      Akato 赤兔祝福館<br>
      by 山腳貓綠光森林創意工坊
    </div>
  </main>

  <script>
    let giftLink = "";

    function createGiftLink() {
      const from = document.getElementById("fromName").value.trim();
      const to = document.getElementById("toName").value.trim();
      const message = document.getElementById("message").value.trim();

      if (!from || !to) {
        alert("請填寫送禮人與收禮人名字");
        return;
      }

      const baseUrl = window.location.origin + "/confirm.html";

      giftLink =
        baseUrl +
        "?from=" + encodeURIComponent(from) +
        "&to=" + encodeURIComponent(to) +
        "&message=" + encodeURIComponent(message || "願你今天被溫柔對待，所有美好都剛好發生。");

      const resultBox = document.getElementById("resultBox");
      resultBox.style.display = "block";
      resultBox.innerHTML =
        "<strong>專屬祝福連結：</strong><br>" +
        giftLink;

      document.getElementById("copyBtn").style.display = "block";
      document.getElementById("lineBtn").style.display = "block";
    }

    function copyGiftLink() {
      navigator.clipboard.writeText(giftLink).then(() => {
        alert("連結已複製，可以貼到 LINE 傳給對方");
      });
    }

    function shareToLine() {
      const text = "有人送你一份 Akato 祝福 🌸\n" + giftLink;
      const lineUrl = "https://line.me/R/msg/text/?" + encodeURIComponent(text);
      window.open(lineUrl, "_blank");
    }
  </script>
</body>
</html>
