<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Akato 赤兔祝福館 - 收到一份心意</title>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    :root {
      --bg-color-1: #F7F1EC;
      --bg-color-2: #F3ECE6;
      --text-main: #8E847C;
      --text-light: #B5ACA3;
      --accent-gold: #D8C5B7;
      --envelope-main: #E6D5C7;
      --envelope-dark: #D4C1B1;
      --btn-white: #FFFFFF;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'PingFang TC', 'Heiti TC', '微軟正黑體', sans-serif;
      background: linear-gradient(135deg, var(--bg-color-1) 0%, var(--bg-color-2) 100%);
      color: var(--text-main);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    #petalCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    #envelope-screen {
      position: absolute;
      z-index: 20;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      transition: opacity 1.2s ease-in-out, transform 1.2s ease-in-out;
      padding: 24px;
    }

    .envelope-title {
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--text-main);
      margin-bottom: 40px;
      text-align: center;
      line-height: 1.7;
      opacity: 0;
      animation: fadeInText 1.5s ease forwards 0.5s;
    }

    .envelope-container {
      position: relative;
      width: 260px;
      height: 170px;
      background-color: var(--envelope-main);
      border-radius: 6px;
      box-shadow: 0 15px 35px rgba(142, 132, 124, 0.2);
      margin-bottom: 50px;
      perspective: 1000px;
      opacity: 0;
      transform: translateY(20px);
      animation: floatUpFade 1.5s ease forwards 0.8s;
      cursor: pointer;
    }

    .envelope-body {
      position: absolute;
      inset: 0;
      background-color: var(--envelope-main);
      border-radius: 6px;
      clip-path: polygon(0 0, 50% 55%, 100% 0, 100% 100%, 0 100%);
      z-index: 3;
      box-shadow: inset 0 0 20px rgba(0,0,0,0.02);
    }

    .envelope-inside {
      position: absolute;
      inset: 0;
      background-color: var(--envelope-dark);
      border-radius: 6px;
      z-index: 1;
    }

    .envelope-flap {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 65%;
      background-color: var(--envelope-main);
      clip-path: polygon(0 0, 100% 0, 50% 100%);
      transform-origin: top;
      transition: transform 1.5s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 4;
      filter: drop-shadow(0 4px 4px rgba(142, 132, 124, 0.1));
    }

    .envelope-seal {
      position: absolute;
      bottom: -15px;
      left: 50%;
      transform: translateX(-50%);
      width: 36px;
      height: 36px;
      background: radial-gradient(circle at 30% 30%, #F4D08F, #D2A455, #9E7A3D);
      border-radius: 50%;
      box-shadow: 0 4px 8px rgba(142, 132, 124, 0.3), inset 0 0 4px rgba(255,255,255,0.5);
      z-index: 5;
      transition: opacity 0.8s ease;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .envelope-seal::after {
      content: '兔';
      color: rgba(255,255,255,0.75);
      font-size: 14px;
      font-weight: bold;
    }

    .envelope-container.open .envelope-flap {
      transform: rotateX(180deg);
      z-index: 2;
    }

    .envelope-container.open .envelope-seal {
      opacity: 0;
    }

    #main-screen {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 430px;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      opacity: 0;
      visibility: hidden;
      transition: opacity 1.5s ease-out;
    }

    .card-container {
      position: relative;
      width: 100%;
      transform: translateY(60px);
      transition: transform 1.8s cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .gift-card {
      background: rgba(255, 255, 255, 0.95);
      backdrop-filter: blur(10px);
      border-radius: 24px;
      padding: 48px 32px;
      text-align: center;
      box-shadow:
        0 15px 35px rgba(142, 132, 124, 0.12),
        0 5px 15px rgba(216, 197, 183, 0.2);
      position: relative;
      overflow: hidden;
      margin-bottom: 40px;
    }

    .gift-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: linear-gradient(90deg, #F0E6DE, var(--accent-gold), #F0E6DE);
    }

    .card-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-main);
      margin-bottom: 24px;
      letter-spacing: 1px;
      line-height: 1.7;
    }

    .card-content {
      font-size: 20px;
      line-height: 1.8;
      color: var(--text-main);
      font-weight: 400;
      letter-spacing: 2px;
    }

    .glow-particles {
      position: absolute;
      bottom: -20px;
      left: 50%;
      transform: translateX(-50%);
      width: 80%;
      height: 40px;
      background: radial-gradient(ellipse at center, rgba(216, 197, 183, 0.4) 0%, rgba(255,255,255,0) 70%);
      animation: pulseGlow 3s infinite alternate ease-in-out;
      pointer-events: none;
      z-index: -1;
    }

    .btn-group {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .btn {
      width: 100%;
      padding: 16px 24px;
      border-radius: 100px;
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      border: none;
      outline: none;
      transition: all 0.3s ease;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
    }

    .btn:active {
      transform: scale(0.96);
    }

    .btn-primary {
      background-color: var(--btn-white);
      box-shadow: 0 8px 20px rgba(142, 132, 124, 0.1);
      border: 1px solid rgba(216, 197, 183, 0.3);
    }

    .btn-secondary {
      background-color: transparent;
      border: 1px solid var(--accent-gold);
    }

    #open-btn {
      max-width: 260px;
      opacity: 0;
      animation: floatUpFade 1.5s ease forwards 1.1s;
    }

    .share-note {
      font-size: 12px;
      opacity: 0.5;
      margin-top: -6px;
      margin-bottom: 4px;
      text-align: center;
      letter-spacing: 1px;
    }

    .brand-logo {
      position: fixed;
      right: 18px;
      bottom: 16px;
      font-size: 12px;
      color: var(--text-main);
      opacity: 0.45;
      letter-spacing: 1px;
      z-index: 30;
      text-align: right;
      line-height: 1.6;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 72px;
      transform: translateX(-50%) translateY(20px);
      background: rgba(255,255,255,0.95);
      color: var(--text-main);
      padding: 12px 18px;
      border-radius: 999px;
      box-shadow: 0 10px 30px rgba(142,132,124,0.18);
      font-size: 14px;
      opacity: 0;
      pointer-events: none;
      z-index: 50;
      transition: all 0.35s ease;
      white-space: nowrap;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @keyframes fadeInText {
      to { opacity: 1; }
    }

    @keyframes floatUpFade {
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulseGlow {
      0% { opacity: 0.4; transform: translateX(-50%) scale(0.9); }
      100% { opacity: 0.8; transform: translateX(-50%) scale(1.1); }
    }

    @media (max-width: 360px) {
      .gift-card {
        padding: 40px 24px;
      }

      .card-content {
        font-size: 18px;
      }

      .envelope-container {
        width: 240px;
        height: 158px;
      }
    }
  </style>
</head>

<body>
  <canvas id="petalCanvas"></canvas>

  <div id="envelope-screen">
    <div class="envelope-title">
      有人悄悄為你準備了一份心意 💌
    </div>

    <div class="envelope-container" id="envelope">
      <div class="envelope-inside"></div>
      <div class="envelope-body"></div>
      <div class="envelope-flap">
        <div class="envelope-seal"></div>
      </div>
    </div>

    <button class="btn btn-primary" onclick="openEnvelope(this)" id="open-btn">
      開啟祝福
    </button>
  </div>

  <div id="main-screen">
    <div class="card-container" id="blessing-card">
      <div class="glow-particles"></div>

      <div class="gift-card" id="capture-card">
        <div class="card-title">
          王小姐想把這份溫柔送給你 🌸
        </div>

        <div class="card-content">
          願你今天被溫柔對待，<br />
          所有美好都剛好發生。
        </div>
      </div>
    </div>

    <div class="btn-group" id="main-btn-group">
      <button class="btn btn-primary" onclick="saveCard(this)">
        收下這份祝福 🌸
      </button>

      <div class="share-note">
        可保存並分享給重要的人
      </div>

      <button class="btn btn-secondary" onclick="goOrder(this)">
        我也想送給重要的人
      </button>
    </div>
  </div>

  <div class="brand-logo">
    Akato 赤兔祝福館<br />
    by 山腳貓綠光森林創意工坊
  </div>

  <div class="toast" id="toast">
    已為你保存這份祝福 🌸
  </div>

  <script>
    let hasOpened = false;

    function openEnvelope(btn) {
      if (hasOpened) return;
      hasOpened = true;

      const envelope = document.getElementById('envelope');
      const envelopeScreen = document.getElementById('envelope-screen');
      const mainScreen = document.getElementById('main-screen');
      const blessingCard = document.getElementById('blessing-card');
      const title = document.querySelector('.envelope-title');

      btn.style.opacity = '0';
      btn.style.pointerEvents = 'none';
      title.style.opacity = '0';

      envelope.classList.add('open');
      burstPetals();

      setTimeout(() => {
        envelopeScreen.style.transform = 'translateY(30px)';
        envelopeScreen.style.opacity = '0';

        setTimeout(() => {
          envelopeScreen.style.display = 'none';
          mainScreen.style.visibility = 'visible';
          mainScreen.style.opacity = '1';
          blessingCard.style.transform = 'translateY(0)';
        }, 1000);
      }, 1500);
    }

    document.getElementById('envelope').addEventListener('click', () => {
      openEnvelope(document.getElementById('open-btn'));
    });

    function clickEffect(btn) {
      btn.style.transform = 'scale(0.96)';
      setTimeout(() => {
        btn.style.transform = 'scale(1)';
      }, 150);
    }

    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');

      setTimeout(() => {
        toast.classList.remove('show');
      }, 2200);
    }

    function saveCard(btn) {
      clickEffect(btn);

      const card = document.getElementById('capture-card');

      html2canvas(card, {
        scale: 2,
        backgroundColor: null,
        useCORS: true
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'akato-祝福.png';
        link.href = canvas.toDataURL('image/png');
        link.click();

        showToast('已為你保存這份祝福 🌸');
      }).catch(() => {
        showToast('請長按畫面截圖收藏這份祝福 🌸');
      });
    }

    function goOrder(btn) {
      clickEffect(btn);

      /*
        之後這裡可以改成你的正式購買頁網址。
        例如：
        window.location.href = 'https://akaton8n.vercel.app';
      */

      showToast('即將開放客製祝福服務 🌸');
    }

    const canvas = document.getElementById('petalCanvas');
    const ctx = canvas.getContext('2d');

    let width;
    let height;
    let petals = [];
    const petalCount = 12;

    function resize() {
      width = canvas.width = window.innerWidth;
      height = canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    class Petal {
      constructor(isBurst = false) {
        this.isBurst = isBurst;
        this.reset(isBurst);

        if (!isBurst) {
          this.y = Math.random() * height;
        }
      }

      reset(isBurst = false) {
        if (isBurst) {
          this.x = width / 2 + (Math.random() * 100 - 50);
          this.y = height / 2 + 50;
          this.size = Math.random() * 8 + 5;
          this.speed = -(Math.random() * 5 + 3);
          this.drift = Math.random() * 6 - 3;
          this.spin = Math.random() * 0.1 - 0.05;
          this.opacity = 1;
        } else {
          this.x = Math.random() * width;
          this.y = -20;
          this.size = Math.random() * 6 + 4;
          this.speed = Math.random() * 0.8 + 0.3;
          this.drift = Math.random() * 0.5 - 0.25;
          this.spin = Math.random() * 0.02 - 0.01;
          this.opacity = Math.random() * 0.5 + 0.3;
        }

        this.angle = Math.random() * Math.PI * 2;
      }

      update() {
        this.y += this.speed;
        this.x += Math.sin(this.angle) * this.drift;
        this.angle += this.spin;

        if (this.isBurst) {
          this.speed += 0.1;

          if (this.speed > 0) {
            this.drift *= 0.95;
          }

          if (this.y > height || this.x < 0 || this.x > width) {
            this.isBurst = false;
            this.reset();
          }
        } else {
          if (this.y > height + 20) {
            this.reset();
          }
        }
      }

      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(this.angle);

        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.bezierCurveTo(-this.size, this.size, -this.size, this.size * 2, 0, this.size * 2);
        ctx.bezierCurveTo(this.size, this.size * 2, this.size, this.size, 0, 0);

        ctx.fillStyle = `rgba(235, 203, 205, ${this.opacity})`;
        ctx.fill();
        ctx.restore();
      }
    }

    for (let i = 0; i < petalCount; i++) {
      petals.push(new Petal(false));
    }

    function burstPetals() {
      for (let i = 0; i < 25; i++) {
        petals.push(new Petal(true));
      }
    }

    function animate() {
      ctx.clearRect(0, 0, width, height);

      petals.forEach(petal => {
        petal.update();
        petal.draw();
      });

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
